services:
  db:
    image: pgvector/pgvector:pg16
    container_name: spiritual_wisdom_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: spiritual_wisdom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
